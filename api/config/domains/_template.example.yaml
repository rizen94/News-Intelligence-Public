# =============================================================================
# DOMAIN ONBOARDING TEMPLATE (example only — do not deploy from this filename)
# =============================================================================
#
# PURPOSE
#   Copy this file to:  api/config/domains/<your-domain_key>.yaml
#   Never use a leading underscore on the real file name — files matching _*.yaml
#   are ignored by domain_registry (see api/shared/domain_registry.py).
#
# END-TO-END CHECKLIST (keep in sync with docs/DOMAIN_EXTENSION_TEMPLATE.md)
#
#   A) Author YAML (this file)
#      1) Copy to <domain_key>.yaml OR run:
#         PYTHONPATH=api uv run python api/scripts/init_domain_yaml_from_template.py \\
#           --domain-key <key> --schema-name <schema> --display-name "…" [--inactive]
#      2) Set data_sources.rss.seed_feed_urls (URLs or {feed_name, feed_url, …} objects).
#         Optional: seed_feed_category (rss_feeds.category is NOT NULL; default General).
#      3) Keep is_active: false until migration + DB verify pass.
#
#   B) Database silo (one migration per new domain, style: 180_legal_domain_silo.sql)
#      4) INSERT public.domains + domain_metadata; CREATE SCHEMA; create_domain_table from
#         science_tech for articles, topics, storylines, rss_feeds, assignments, clusters,
#         entity tables; add_domain_foreign_keys / indexes / triggers; story_entity_index +
#         manual FK fixes where LIKE omits references.
#      5) Apply migration; register in public.applied_migrations if your ops use the ledger.
#
#   C) Provision + seed RSS
#      6) PYTHONPATH=api uv run python api/scripts/provision_domain.py \\
#           --config api/config/domains/<key>.yaml --sql api/database/migrations/NNN_….sql \\
#           --verify-cmd "PYTHONPATH=api uv run python api/scripts/verify_migrations_160_167.py"
#         (Omit --skip-rss-seed so seed_feed_urls are inserted into {schema}.rss_feeds.)
#
#   D) Final verification (run before is_active: true)
#      7) PYTHONPATH=api uv run python api/scripts/verify_domain_provision.py --domain-key <key>
#         [--strict]  (YAML + registry + schema + tables + RSS + synthesis hint)
#      8) PYTHONPATH=api uv run python api/scripts/ensure_domain_silo_alignment.py
#         (sync public.domains with YAML on each host: API, Widow RSS, workers)
#
#   E) Activate + optional tuning
#      9) Set is_active: true in this YAML. domain_registry re-reads files each call — restart
#         API/workers only if a process still caches domain lists at import (see README).
#     10) Add api/config/domain_synthesis_config.yaml → domains:<domain_key>: … if you need
#         topic/storyline bias (separate from this onboarding file).
#     11) GET /api/system_monitoring/registry_domains — confirm the domain appears (SPA uses this).
#     12) Grep for hardcoded three-domain tuples in features you care about (see domains README).
#
# =============================================================================
# DATABASE RULES (public.domains — see migration 122 / 180 patterns)
# =============================================================================
#
#   domain_key     REQUIRED  pattern ^[a-z0-9-]+$  (hyphens OK; NO underscores)
#   schema_name    REQUIRED  pattern ^[a-z0-9_]+$  (Postgres identifier; use underscores)
#   name           maps from display_name   VARCHAR(100) — HARD CAP 100 characters
#   description    TEXT — no hard DB cap; recommend ≤ ~4000 chars for readability
#   display_order  integer — lower sorts earlier in nav when UI uses it
#   is_active      in YAML: if false, domain_registry does NOT register this file
#
# PIPELINE (after go-live)
#   • RSS: collect_rss_feeds() uses url_schema_pairs() → {schema}.rss_feeds WHERE is_active.
#   • Automation: get_all_domains() = registry YAML + existing Postgres schema (see AGENTS.md).
#   • Disable a silo: set is_active: false here (or remove file) — do not rely only on
#     public.domains.is_active for pipeline off.
#
# VALID domain_key / schema_name EXAMPLES
#   domain_key: science-tech     schema_name: science_tech   OK
#   domain_key: legal            schema_name: legal         OK
#
# INVALID (will fail DB check or break URLs)
#   domain_key: Science_Tech     # uppercase / underscore not allowed in key
#   domain_key: sci tech         # spaces not allowed
#   schema_name: science-tech    # hyphen in schema_name not allowed by CHECK
#
# YAML FORMATTING
#   - File encoding: UTF-8
#   - Quote strings that contain ":" or "#" to avoid parse surprises
#   - Multiline operator text: use "|" or ">" (see llm_prompt_guidance below)
#
# KEYS STARTING WITH _
#   Any key whose name begins with "_" is stripped before merge (human-only).
#   Example: _instructions, _comment — never interpreted by domain_registry.
#
# =============================================================================

# --- REQUIRED ----------------------------------------------------------------
# URL path segment: /api/{domain_key}/... and /{domain_key}/... in the web app
domain_key: example-domain

# --- REQUIRED ----------------------------------------------------------------
# Postgres schema for this silo (articles, storylines, topics, rss_feeds, …)
schema_name: example_domain

# --- REQUIRED ----------------------------------------------------------------
# Becomes public.domains.name — MUST be <= 100 characters (count spaces)
display_name: Example Domain

# --- OPTIONAL ----------------------------------------------------------------
# public.domains.description — keep concise (recommend under ~4000 chars)
description: >-
  One or two sentences for operators and internal docs.

# --- OPTIONAL ----------------------------------------------------------------
# Sort order in UI when domains are listed (integer; lower = earlier)
display_order: 10

# --- REQUIRED FOR SAFE ROLLOUT -------------------------------------------------
# false = this YAML file is ignored for API registration (no extra domain_key).
# Set true ONLY after: migration applied, verify_domain_provision.py passes, feeds seeded as needed.
is_active: false

# --- HUMAN-ONLY (stripped by loader — any _prefix key) -------------------------
_instructions: |
  Replace example-domain / example_domain before enabling.
  After provision: run verify_domain_provision.py --domain-key <key>, then ensure_domain_silo_alignment.py.
  Reserve schema names: see RESERVED_SCHEMA_NAMES in api/shared/domain_registry.py (e.g. do not reuse
  intelligence, artificial_intelligence, or core silo names for a new optional domain).

# Optional human note (also stripped at load)
_comment: |
  data_sources.rss is consumed only by provision_domain.py / seed_domain_rss_from_yaml.py, not domain_registry.

# --- OPTIONAL — RSS seeding (provision_domain.py + seed_domain_rss_from_yaml.py) -----
data_sources:
  rss:
    # Default rss_feeds.category for seeded rows (NOT NULL on silo tables); max ~100 chars.
    # seed_feed_category: General
    # inclusion_criteria / exclusion_criteria: human notes for operators (not read by seed scripts today).
    # URLs → {schema_name}.rss_feeds when you run provision_domain.py (after SQL) or seed_domain_rss_from_yaml.py
    seed_feed_urls: []
    # Example object form:
    # seed_feed_urls:
    #   - feed_url: https://example.com/feed.xml
    #     feed_name: Example News
    #     fetch_interval_seconds: 3600

# --- OPTIONAL — list of strings; documentation / future topic bias -------------
focus_areas: []
# Example:
# focus_areas:
#   - appellate decisions
#   - regulatory enforcement

# --- OPTIONAL — multiline string; use "|" for paragraph breaks ----------------
llm_prompt_guidance: |
  Short neutral guidance for summarization and topic assignment for this silo.
  Prefer factual reporting; avoid invented citations or case numbers.

# --- OPTIONAL — day-zero hints for domain_onboarding_estimates (see docs) -----
workload_assumptions:
  expected_active_feeds: 0
  rough_new_articles_per_day: 0
  llm_heavy_phases_enabled: true
