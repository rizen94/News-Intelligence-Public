# =============================================================================
# DOMAIN ONBOARDING (fill in for a NEW optional domain — not politics/finance/science-tech)
# =============================================================================
#
# Save as: api/config/domains/<domain_key>.yaml  (filename must NOT start with _)
# Loader: api/shared/domain_registry.py
# Procedure: docs/DOMAIN_EXTENSION_TEMPLATE.md + api/config/domains/README.md
#
# WORKFLOW (summary — this silo is live: is_active true below)
#   1) New domains: start with is_active: false until DB silo + verify exist, then set true.
#   2) Validate YAML (syntax + UTF-8).
#   3) SQL migration: public.domains row + CREATE SCHEMA + silo tables (parity with existing domains).
#   4) Run api/scripts/provision_domain.py (YAML + SQL + verify command).
#   5) SPA loads domains from GET /api/system_monitoring/registry_domains — no manual frontend list edit.
#
# DATABASE / URL RULES
#   domain_key:     ^[a-z0-9-]+$   (hyphens OK; no underscores)
#   schema_name:    ^[a-z0-9_]+$   (underscores OK; no hyphens)
#   display_name:   max 100 chars → public.domains.name
#
# =============================================================================

# --- REQUIRED ----------------------------------------------------------------
domain_key: medicine

# --- REQUIRED ----------------------------------------------------------------
schema_name: medicine

# --- REQUIRED ----------------------------------------------------------------
display_name: Medicine & Health Research

# --- OPTIONAL ----------------------------------------------------------------
description: >-
  Medical research, clinical trials, epidemiology, public health, and biomedical advances.

# --- OPTIONAL ----------------------------------------------------------------
display_order: 20

# --- REGISTRY ---------------------------------------------------------------
# true: included in domain_registry / url_schema_pairs (YAML re-read each call for iterators).
is_active: true

# --- HUMAN-ONLY (stripped by loader — use for notes to operators) ------------
_instructions: |
  Covers peer-reviewed medical research, clinical trials, FDA announcements, WHO reports,
  and major medical journal publications. Focus on breakthrough treatments, epidemiology,
  and public health policy impacts.

# --- OPTIONAL ----------------------------------------------------------------
data_sources:
  rss:
    seed_feed_urls:
      # PubMed: tune query via pubmed.ncbi.nlm.nih.gov “Create RSS” if this search is too broad/narrow
      - https://pubmed.ncbi.nlm.nih.gov/rss/create/saved_searches/?term=medicine%5BMeSH+Major+Topic%5D&limit=100
      - https://www.nejm.org/action/showFeed?jc=nejm&type=etoc&feed=rss
      - https://www.thelancet.com/rssfeed/lancet_current.xml
      - https://jamanetwork.com/feeds/journals/jama
      - https://www.bmj.com/content/current.rss
      - https://www.nature.com/nm.rss
      - https://www.who.int/rss-feeds/news-english.xml
      - https://www.fda.gov/news-events/fda-newsroom/rss.xml
      - https://clinicaltrials.gov/ct2/results/rss.xml?rcv_d=14&lup_d=14&sel_rss=new14&count=10000
      - https://connect.medrxiv.org/medrxiv_xml.php
      - https://connect.biorxiv.org/biorxiv_xml.php?subject=all

# --- OPTIONAL ----------------------------------------------------------------
focus_areas:
  - Clinical trials and drug development
  - Epidemiology and disease surveillance
  - Medical breakthroughs and treatments
  - Public health policy and guidelines
  - Biomedical research and discoveries
  - Healthcare technology and digital health
  - Vaccine development and immunology
  - Genetics and precision medicine

# --- OPTIONAL ----------------------------------------------------------------
llm_prompt_guidance: |
  Focus on evidence-based medical research and clinical significance. Distinguish between
  preliminary studies, clinical trials, and approved treatments. Highlight sample sizes,
  study limitations, and peer review status. Avoid sensationalizing medical claims. Include
  relevant regulatory approvals (FDA, EMA, etc.) and clinical trial phases where applicable.

# --- OPTIONAL ----------------------------------------------------------------
workload_assumptions:
  expected_active_feeds: 25
  rough_new_articles_per_day: 200
  llm_heavy_phases_enabled: true
