# Template-style politics silo (parallel to built-in ``politics``). Requires migration 201.
# After SQL: seed RSS (copy from ``politics.rss_feeds`` or use ``seed_domain_rss_from_yaml.py``).
# To send new RSS ingest here only: ``RSS_INGEST_EXCLUDE_DOMAIN_KEYS=politics`` in .env.

domain_key: politics-2
schema_name: politics_2
display_name: Politics (template)
description: >-
  YAML-onboarded politics silo for gradual migration off legacy ``politics`` schema.
  Same pipeline and tables; new articles land here when ingest excludes ``politics``.
display_order: 25
is_active: true

_instructions: |
  1. Apply api/database/migrations/201_politics2_finance2_domain_silos.sql (run_migration_201.py).
  2. Copy active feeds from politics.rss_feeds into politics_2.rss_feeds (SQL or future script);
     or list URLs under data_sources.rss.seed_feed_urls and run seed_domain_rss_from_yaml.py.
  3. Set RSS_INGEST_EXCLUDE_DOMAIN_KEYS=politics when -2 feeds are live.
  4. Optional: POLITICS_PG_CONTENT_DOMAIN_KEY=politics-2 for background jobs that read articles by domain.

data_sources:
  rss:
    seed_feed_urls: []

focus_areas:
  - Same editorial scope as legacy politics silo during migration

llm_prompt_guidance: |
  Align with production politics silo until cutover is complete.

workload_assumptions:
  expected_active_feeds: 0
  rough_new_articles_per_day: 0
  llm_heavy_phases_enabled: true
