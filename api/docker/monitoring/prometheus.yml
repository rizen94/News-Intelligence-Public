global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'news-system-api'
    static_configs:
      - targets: ['news-system-app:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'postgres'
    static_configs:
      - targets: ['news-system-postgres-exporter:9187']
    scrape_interval: 30s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['news-system-node-exporter:9100']
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['news-system-redis:6379']
    scrape_interval: 30s
