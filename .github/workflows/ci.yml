# Unified CI: Python (api/tests) + frontend (web). Single workflow — no duplicate frontend jobs.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + dev tools
        run: uv sync --extra dev

      - name: Ruff format (check)
        run: uv run ruff format --check api tests

      - name: Ruff lint
        run: uv run ruff check api tests

      - name: Pytest smoke
        run: |
          uv run pytest tests/unit/test_orchestrator_types.py tests/unit/test_orchestrator_utils.py -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      # Bundle smoke (no `tsc` gate). Use `npm run build` locally for full tsc + release build.
      - name: Vite build
        run: npx vite build
