# Illustrative stack — not guaranteed to match the canonical API DB config.
# The running FastAPI app uses DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
# (see api/shared/database/connection.py), not DATABASE_URL. Align env vars before
# relying on this file for local bring-up. See docs/CODE_REVIEW_AND_RUN_CAVEATS.md.
services:
  postgres:
    image: postgres:15-alpine
    container_name: news-intelligence-postgres
    environment:
      POSTGRES_DB: news_intelligence
      POSTGRES_USER: newsapp
      POSTGRES_PASSWORD: newsapp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - news-network-v2

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: news-intelligence-api
    environment:
      DATABASE_URL: postgresql://newsapp:newsapp_password@news-intelligence-postgres:5432/news_intelligence
      ENVIRONMENT: production
      PYTHONPATH: /app
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - news-network-v2

  web:
    image: nginx:alpine
    container_name: news-intelligence-web
    ports:
      - "80:80"
    volumes:
      - ./web/build:/usr/share/nginx/html
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - news-network-v2

networks:
  news-network-v2:
    driver: bridge

volumes:
  postgres_data:
    driver: local
