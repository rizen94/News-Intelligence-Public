server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Serve React app with SPA routing
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Cache HTML files for 5 minutes
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache static assets (CSS, JS, images, fonts) for 1 hour
    location ~* \.(css|js|jpg|jpeg|gif|png|ico|svg|eot|otf|ttf|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Proxy API calls to backend (no caching)
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
