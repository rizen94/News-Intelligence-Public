<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Intelligence API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .article { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 3px; }
        .feed { margin: 10px 0; padding: 10px; background: #e8f4fd; border-radius: 3px; }
        .error { color: red; }
        .success { color: green; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .loading { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>News Intelligence System - API Test</h1>
        
        <div class="section">
            <h2>System Health</h2>
            <button onclick="testHealth()">Test Health</button>
            <div id="health-result"></div>
        </div>

        <div class="section">
            <h2>Articles</h2>
            <button onclick="testArticles()">Load Articles</button>
            <div id="articles-result"></div>
        </div>

        <div class="section">
            <h2>RSS Feeds</h2>
            <button onclick="testRSSFeeds()">Load RSS Feeds</button>
            <div id="rss-result"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';

        async function testHealth() {
            const resultDiv = document.getElementById('health-result');
            resultDiv.innerHTML = '<div class="loading">Testing health endpoint...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/health/`);
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">✅ Health Check Passed</div>
                        <div>Status: ${data.data.status}</div>
                        <div>Database: ${data.data.services.database}</div>
                        <div>Redis: ${data.data.services.redis}</div>
                        <div>System: ${data.data.services.system}</div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Health Check Failed: ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Connection Error: ${error.message}</div>`;
            }
        }

        async function testArticles() {
            const resultDiv = document.getElementById('articles-result');
            resultDiv.innerHTML = '<div class="loading">Loading articles...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/articles/`);
                const data = await response.json();
                
                if (data.success) {
                    const articles = data.data.articles;
                    let html = `<div class="success">✅ Loaded ${articles.length} articles</div>`;
                    
                    articles.forEach(article => {
                        html += `
                            <div class="article">
                                <h3>${article.title}</h3>
                                <p><strong>Source:</strong> ${article.source}</p>
                                <p><strong>Published:</strong> ${new Date(article.published_at).toLocaleString()}</p>
                                <p><strong>Word Count:</strong> ${article.word_count}</p>
                                <p><strong>Reading Time:</strong> ${article.reading_time} minutes</p>
                                <p><strong>Content:</strong> ${article.content.substring(0, 100)}...</p>
                            </div>
                        `;
                    });
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Failed to load articles: ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Connection Error: ${error.message}</div>`;
            }
        }

        async function testRSSFeeds() {
            const resultDiv = document.getElementById('rss-result');
            resultDiv.innerHTML = '<div class="loading">Loading RSS feeds...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/rss/feeds/`);
                const data = await response.json();
                
                if (data.success) {
                    const feeds = data.data.feeds;
                    let html = `<div class="success">✅ Loaded ${feeds.length} RSS feeds</div>`;
                    
                    feeds.forEach(feed => {
                        html += `
                            <div class="feed">
                                <h3>${feed.name}</h3>
                                <p><strong>URL:</strong> ${feed.url}</p>
                                <p><strong>Created:</strong> ${new Date(feed.created_at).toLocaleString()}</p>
                                <p><strong>Last Fetched:</strong> ${feed.last_fetched ? new Date(feed.last_fetched).toLocaleString() : 'Never'}</p>
                            </div>
                        `;
                    });
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Failed to load RSS feeds: ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Connection Error: ${error.message}</div>`;
            }
        }

        // Auto-test on page load
        window.onload = function() {
            testHealth();
        };
    </script>
</body>
</html>
